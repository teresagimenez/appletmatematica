<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Función Racional Interactiva</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>

    *{
      box-sizing:border-box;
    }

    body{
      font-family:Arial, sans-serif;
      background:#f4f4f4;
      margin:0;
      padding:10px;
    }

    .contenedor{
      width:100%;
      background:white;
      border-radius:18px;
      padding:15px;
      box-shadow:0 0 10px rgba(0,0,0,0.15);
    }

    h1{
      text-align:center;
      font-size:24px;
      margin-top:5px;
      margin-bottom:20px;
    }

    /* FORMULA */

    .formula{
      display:flex;
      justify-content:center;
      align-items:center;
      gap:10px;
      margin-bottom:20px;
      font-size:24px;
      font-weight:bold;
      flex-wrap:wrap;
    }

    .fraccion{
      display:inline-block;
      text-align:center;
    }

    .numerador{
      border-bottom:3px solid black;
      padding:0 12px 5px 12px;
    }

    .denominador{
      padding-top:5px;
    }

    /* SLIDERS */

    .sliders{
      display:flex;
      flex-direction:column;
      gap:14px;
      margin-bottom:20px;
    }

    .slider-box{
      background:#fafafa;
      border:1px solid #ddd;
      border-radius:14px;
      padding:12px;
    }

    .slider-box label{
      display:block;
      font-size:18px;
      margin-bottom:8px;
      font-weight:bold;
    }

    input[type="range"]{
      width:100%;
      height:35px;
    }

    /* GRAFICA */

    .grafica-container{
      width:100%;
      overflow:hidden;
      border-radius:15px;
      background:white;
    }

    canvas{
      width:100% !important;
      height:420px !important;
    }

    /* MOVIL */

    @media(max-width:600px){

      h1{
        font-size:22px;
      }

      .formula{
        font-size:20px;
      }

      .slider-box label{
        font-size:16px;
      }

      canvas{
        height:350px !important;
      }
    }

  </style>
</head>
<body>

<div class="contenedor">

  <h1>Función Racional</h1>

  <div class="formula">

    <span>f(x)=</span>

    <div class="fraccion">

      <div class="numerador">
        ax + b
      </div>

      <div class="denominador">
        cx + d
      </div>

    </div>

  </div>

  <div class="sliders">

    <div class="slider-box">
      <label>a = <span id="valorA">1</span></label>
      <input type="range" id="a" min="-10" max="10" step="1" value="1">
    </div>

    <div class="slider-box">
      <label>b = <span id="valorB">0</span></label>
      <input type="range" id="b" min="-10" max="10" step="1" value="0">
    </div>

    <div class="slider-box">
      <label>c = <span id="valorC">1</span></label>
      <input type="range" id="c" min="-10" max="10" step="1" value="1">
    </div>

    <div class="slider-box">
      <label>d = <span id="valorD">1</span></label>
      <input type="range" id="d" min="-10" max="10" step="1" value="1">
    </div>

  </div>

  <div class="grafica-container">
    <canvas id="grafica"></canvas>
  </div>

</div>

<script>

const ctx = document.getElementById('grafica').getContext('2d');

let chart;

function generarDatos(a,b,c,d){

  let puntos = [];

  for(let x=-20; x<=20; x+=0.05){

    let denominador = c*x + d;

    if(Math.abs(denominador) > 0.03){

      let y = (a*x + b)/(c*x + d);

      puntos.push({
        x:x,
        y:y
      });
    }
  }

  return puntos;
}

function actualizarGrafica(){

  const a = Number(document.getElementById('a').value);
  const b = Number(document.getElementById('b').value);
  const c = Number(document.getElementById('c').value);
  const d = Number(document.getElementById('d').value);

  document.getElementById('valorA').innerText = a;
  document.getElementById('valorB').innerText = b;
  document.getElementById('valorC').innerText = c;
  document.getElementById('valorD').innerText = d;

  const datos = generarDatos(a,b,c,d);

  if(chart){
    chart.destroy();
  }

  chart = new Chart(ctx, {

    type:'scatter',

    data:{
      datasets:[{
        label:`f(x)=(${a}x+${b})/(${c}x+${d})`,
        data:datos,
        borderColor:'blue',
        backgroundColor:'blue',
        showLine:true,
        pointRadius:0,
        borderWidth:2
      }]
    },

    options:{

      responsive:true,
      maintainAspectRatio:false,

      plugins:{
        legend:{
          display:false
        }
      },

      scales:{

        x:{

          type:'linear',
          min:-20,
          max:20,
          position:'center',

          ticks:{
            stepSize:2,
            color:'black',
            font:{
              size:12
            }
          },

          grid:{
            color:(context)=>{
              return context.tick.value === 0 ? 'black' : '#ddd';
            },

            lineWidth:(context)=>{
              return context.tick.value === 0 ? 3 : 1;
            }
          }
        },

        y:{

          min:-20,
          max:20,
          position:'center',

          ticks:{
            stepSize:2,
            color:'black',
            font:{
              size:12
            }
          },

          grid:{
            color:(context)=>{
              return context.tick.value === 0 ? 'black' : '#ddd';
            },

            lineWidth:(context)=>{
              return context.tick.value === 0 ? 3 : 1;
            }
          }
        }
      }
    }
  });
}

document.querySelectorAll('input').forEach(input=>{
  input.addEventListener('input', actualizarGrafica);
});

actualizarGrafica();

</script>

</body>
</html>
</body>
</html>
