<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Funciones Afines</title>

<style>
body{
    font-family:Arial, sans-serif;
    margin:0;
    padding:15px;
    background:#f2f2f2;
    display:flex;
    justify-content:center;
}

.container{
    width:100%;
    max-width:900px;
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
    color:#333;
}

.controls{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
    margin-bottom:20px;
}

.control-box{
    background:#f7f7f7;
    padding:15px;
    border-radius:10px;
}

label{
    font-weight:bold;
    display:block;
    margin-top:10px;
}

input[type=range]{
    width:100%;
}

.value{
    font-size:18px;
    color:#0066cc;
    font-weight:bold;
}

canvas{
    width:100%;
    max-width:100%;
    height:auto;
    display:block;
    background:white;
    border:2px solid #ccc;
    border-radius:10px;
    touch-action:none;
}

.info{
    margin-top:20px;
    background:#eef5ff;
    padding:15px;
    border-radius:10px;
    line-height:1.6;
}

.formula{
    font-size:24px;
    text-align:center;
    margin-bottom:15px;
    font-weight:bold;
}

@media(max-width:700px){
    body{
        padding:8px;
    }

    .container{
        padding:12px;
        border-radius:10px;
    }

    .controls{
        grid-template-columns:1fr;
        gap:12px;
    }

    .formula{
        font-size:18px;
    }

    h1{
        font-size:22px;
    }

    .control-box{
        padding:12px;
    }

    .value{
        font-size:16px;
    }

    input[type=range]{
        height:40px;
    }

    canvas{
        width:100%;
        height:320px;
    }

    .info{
        font-size:15px;
        padding:12px;
    }
}
</style>
</head>
<body>

<div class="container">

<h1>Función afín: f(x)=mx+n</h1>

<div class="formula" id="formula">
    f(x)=1x+0
</div>

<div class="controls">

    <div class="control-box">
        <label>Pendiente (m)</label>
        <input type="range" id="m" min="-5" max="5" step="0.1" value="1">
        <div class="value" id="mValue">m = 1</div>

        <label>Ordenada al origen (n)</label>
        <input type="range" id="n" min="-10" max="10" step="0.1" value="0">
        <div class="value" id="nValue">n = 0</div>
    </div>

    </div>

<canvas id="graph" width="800" height="500"></canvas>



</div>

<script>
const canvas = document.getElementById('graph');
const ctx = canvas.getContext('2d');

const mSlider = document.getElementById('m');
const nSlider = document.getElementById('n');

const mValue = document.getElementById('mValue');
const nValue = document.getElementById('nValue');
const formula = document.getElementById('formula');


function draw(){

    const m = parseFloat(mSlider.value);
    const n = parseFloat(nSlider.value);

    mValue.textContent = 'm = ' + m;
    nValue.textContent = 'n = ' + n;

    let signo = n >= 0 ? '+' : '-';

    formula.innerHTML = `f(x) = ${m}x ${signo} ${Math.abs(n)}`;

    ctx.clearRect(0,0,canvas.width,canvas.height);

    const w = canvas.width;
    const h = canvas.height;

    const scale = 30;

    const centerX = w/2;
    const centerY = h/2;

    // cuadrícula
    ctx.strokeStyle = '#ddd';
    ctx.lineWidth = 1;

    for(let x=0;x<w;x+=scale){
        ctx.beginPath();
        ctx.moveTo(x,0);
        ctx.lineTo(x,h);
        ctx.stroke();
    }

    for(let y=0;y<h;y+=scale){
        ctx.beginPath();
        ctx.moveTo(0,y);
        ctx.lineTo(w,y);
        ctx.stroke();
    }

    // ejes
    ctx.strokeStyle = 'black';
    ctx.lineWidth = 2;

    ctx.beginPath();
    ctx.moveTo(0,centerY);
    ctx.lineTo(w,centerY);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(centerX,0);
    ctx.lineTo(centerX,h);
    ctx.stroke();

    // números
    ctx.fillStyle = 'black';
    ctx.font = '12px Arial';

    for(let i=-13;i<=13;i++){
        let x = centerX + i*scale;
        ctx.fillText(i,x-4,centerY+15);
    }

    for(let i=-8;i<=8;i++){
        let y = centerY - i*scale;
        if(i!==0){
            ctx.fillText(i,centerX+5,y+4);
        }
    }

    // recta
    ctx.strokeStyle = '#0066cc';
    ctx.lineWidth = 3;

    ctx.beginPath();

    for(let px=0; px<w; px++){

        let x = (px-centerX)/scale;
        let y = m*x + n;

        let py = centerY - y*scale;

        if(px===0){
            ctx.moveTo(px,py);
        }else{
            ctx.lineTo(px,py);
        }
    }

    ctx.stroke();

    // punto de corte con eje y
    ctx.fillStyle = 'red';

    let yIntercept = centerY - n*scale;

    ctx.beginPath();
    ctx.arc(centerX,yIntercept,6,0,Math.PI*2);
    ctx.fill();

    ctx.fillText('(0,'+n+')', centerX+10, yIntercept-10);

    // raíz de la función

    if(m !== 0){

        let raiz = -n/m;

        let raizX = centerX + raiz*scale;

        ctx.fillStyle = 'green';

        ctx.beginPath();
        ctx.arc(raizX, centerY, 6, 0, Math.PI*2);
        ctx.fill();

        ctx.fillText('('+raiz.toFixed(1)+',0)', raizX+10, centerY-10);
    }

    
}

mSlider.addEventListener('input', draw);
nSlider.addEventListener('input', draw);

function resizeCanvas(){

    if(window.innerWidth < 700){
        canvas.width = window.innerWidth - 40;
        canvas.height = 320;
    }else{
        canvas.width = 800;
        canvas.height = 500;
    }

    draw();
}

window.addEventListener('resize', resizeCanvas);

resizeCanvas();

draw();
</script>

</body>
</html>
