<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Museo de Funciones</title>

<style>

body{
  font-family: Arial;
  text-align: center;
}

.screen{
  display: none;
}

.active{
  display: block;
}

.mapa{
  position: relative;
  width: 750px;
  height: 450px;
  margin: auto;
  border: 4px solid black;
  background: #f2f2f2;
}

.pared{
  position: absolute;
  background: black;
}

.h{
  height: 4px;
}

.v{
  width: 4px;
}

.puerta{
  position: absolute;
  background: #f2f2f2;
}

.entrada{
  position: absolute;
  bottom: 0;
  left: 320px;
  width: 100px;
  height: 20px;
  background: #f2f2f2;
  border-top: 4px solid black;
  font-weight: bold;
}

.sala{
  position: absolute;
  width: 80px;
  height: 50px;
  background: red;
  color: white;
  font-size: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  border-radius: 6px;
}

#s1 { top: 340px; left: 320px; }
#s2 { top: 220px; left: 320px; }
#s3 { top: 220px; left: 100px; }
#s4 { top: 220px; left: 540px; }
#s5 { top: 80px; left: 100px; }
#s6 { top: 80px; left: 320px; }
#s7 { top: 80px; left: 540px; }

canvas{
  border: 10px solid #5a3e2b;
  background: white;
}

.funcion{
  font-size: 24px;
  margin: 15px;
  font-family: "Cambria Math", "Times New Roman", serif;
}

.fraccion{
  font-size: 24px;
  font-family: "Cambria Math", "Times New Roman", serif;
}

.frac{
  display: inline-block;
  vertical-align: middle;
  text-align: center;
  margin: 0 2px;
}

.frac .top{
  display: block;
  border-bottom: 2px solid black;
  padding: 0 8px 3px 8px;
}

.frac .bottom{
  display: block;
  padding-top: 3px;
}

button{
  margin-top: 10px;
  padding: 10px;
}

</style>
</head>

<body>

<h1>🏛️ Museo de Funciones</h1>

<div id="mapa" class="screen active">

<div class="mapa">

  <!-- Bordes -->
  <div class="pared h" style="top:0; left:0; width:750px;"></div>
  <div class="pared h" style="top:446px; left:0; width:750px;"></div>

  <div class="pared v" style="top:0; left:0; height:450px;"></div>
  <div class="pared v" style="top:0; left:746px; height:450px;"></div>

  <!-- Paredes -->
  <div class="pared h" style="top:300px; left:0; width:750px;"></div>
  <div class="pared h" style="top:160px; left:0; width:750px;"></div>

  <div class="pared v" style="top:0; left:250px; height:300px;"></div>
  <div class="pared v" style="top:0; left:500px; height:300px;"></div>

  <!-- Puertas -->
  <div class="puerta" style="top:300px; left:350px; width:70px; height:4px;"></div>

  <div class="puerta" style="top:240px; left:250px; width:4px; height:60px;"></div>
  <div class="puerta" style="top:240px; left:500px; width:4px; height:60px;"></div>

  <div class="puerta" style="top:160px; left:120px; width:40px; height:4px;"></div>
  <div class="puerta" style="top:160px; left:370px; width:40px; height:4px;"></div>
  <div class="puerta" style="top:160px; left:620px; width:40px; height:4px;"></div>

  <div class="entrada">Entrada</div>

  <!-- Salas -->
  <div id="s1" class="sala" onclick="abrir('c1')">Sala 1</div>
  <div id="s2" class="sala" onclick="abrir('c2')">Sala 2</div>
  <div id="s3" class="sala" onclick="abrir('c3')">Sala 3</div>
  <div id="s4" class="sala" onclick="abrir('c4')">Sala 4</div>
  <div id="s5" class="sala" onclick="abrir('c5')">Sala 5</div>
  <div id="s6" class="sala" onclick="abrir('c6')">Sala 6</div>
  <div id="s7" class="sala" onclick="abrir('c7')">Sala 7</div>

</div>
</div>

<!-- SALAS -->

<div id="c1" class="screen">
  <h2>Sala 1</h2>
  <div class="funcion">
    f(x) = x³ − 6x² + 8x
  </div>
  <canvas id="f1" width="300" height="300"></canvas>
  <button onclick="volver()">Volver</button>
</div>

<div id="c2" class="screen">
  <h2>Sala 2</h2>

  <div class="funcion fraccion">
    f(x) =
    <span class="frac">
      <span class="top">x² − x</span>
      <span class="bottom">x + 1</span>
    </span>
  </div>

  <canvas id="f2" width="300" height="300"></canvas>
  <button onclick="volver()">Volver</button>
</div>

<div id="c3" class="screen">
  <h2>Sala 3</h2>

  <div class="funcion">
    f(x) = ln(x + 2)
  </div>

  <canvas id="f3" width="300" height="300"></canvas>
  <button onclick="volver()">Volver</button>
</div>

<div id="c4" class="screen">
  <h2>Sala 4</h2>

  <div class="funcion">
    f(x) = 2x − 5
  </div>

  <canvas id="f4" width="300" height="300"></canvas>
  <button onclick="volver()">Volver</button>
</div>

<div id="c5" class="screen">
  <h2>Sala 5</h2>

  <div class="funcion fraccion">

    f(x) =

    <span class="frac">
      <span class="top">
        √<span style="text-decoration: overline;">x + 1</span>
      </span>
      <span class="bottom">x − 2</span>
    </span>

  </div>

  <canvas id="f5" width="300" height="300"></canvas>
  <button onclick="volver()">Volver</button>
</div>

<div id="c6" class="screen">
  <h2>Sala 6</h2>

  <div class="funcion">
    f(x) = |eˣ − 1|
  </div>

  <canvas id="f6" width="300" height="300"></canvas>
  <button onclick="volver()">Volver</button>
</div>

<div id="c7" class="screen">
  <h2>Sala 7</h2>

  <div class="funcion">

    f(x) =

    <span class="frac">
      <span class="top">-(x² − 4x − 5)</span>
      <span class="bottom">2</span>
    </span>

  </div>

  <canvas id="f7" width="300" height="300"></canvas>
  <button onclick="volver()">Volver</button>
</div>

<script>

function abrir(id){

  document
    .querySelectorAll('.screen')
    .forEach(s => s.classList.remove('active'));

  document
    .getElementById(id)
    .classList.add('active');
}

function volver(){

  document
    .querySelectorAll('.screen')
    .forEach(s => s.classList.remove('active'));

  document
    .getElementById('mapa')
    .classList.add('active');
}

function dibujar(
  canvasId,
  f,
  escalaX = 20,
  escalaY = 20,
  asintota = null,
  pasoY = 1
){

  const c = document.getElementById(canvasId);
  const ctx = c.getContext("2d");

  const w = c.width;
  const h = c.height;

  ctx.clearRect(0,0,w,h);

  // EJES

  ctx.beginPath();

  ctx.moveTo(0, h/2);
  ctx.lineTo(w, h/2);

  ctx.moveTo(w/2, 0);
  ctx.lineTo(w/2, h);

  ctx.strokeStyle = "black";
  ctx.lineWidth = 1;

  ctx.stroke();

  // NUMEROS EJE X

  ctx.font = "10px Arial";

  for(let i = -6; i <= 6; i++){

    ctx.fillText(
      i,
      w/2 + i*escalaX - 5,
      h/2 + 12
    );
  }

  // NUMEROS EJE Y

  for(let i = -35; i <= 35; i += pasoY){

    if(i !== 0){

      let py = h/2 - i*escalaY;

      if(py >= 0 && py <= h){

        ctx.fillText(
          i,
          w/2 + 5,
          py + 3
        );
      }
    }
  }

  // ZONA INVALIDA LOG

  if(canvasId === "f3"){

    let px = w/2 + (-2)*escalaX;

    for(let y = 0; y < h; y += 12){

      ctx.beginPath();

      ctx.moveTo(0,y);

      ctx.lineTo(px - 2,y + 12);

      ctx.strokeStyle = "rgba(255,0,0,0.15)";

      ctx.stroke();
    }
  }

  // ZONA INVALIDA SALA 5

  if(canvasId === "f5"){

    let px = w/2 + (-1)*escalaX;

    for(let y = 0; y < h; y += 12){

      ctx.beginPath();

      ctx.moveTo(0,y);

      ctx.lineTo(px - 2,y + 12);

      ctx.strokeStyle = "rgba(255,0,0,0.15)";

      ctx.stroke();
    }
  }

  // FUNCION

  ctx.beginPath();

  let first = true;

  let inicio = -10;
  let paso = 0.01;

  if(canvasId === "f3"){

    inicio = -1.999;
    paso = 0.0005;
  }

  for(let x = inicio; x <= 10; x += paso){

    if(asintota !== null && canvasId !== "f3"){

      let lista = Array.isArray(asintota)
        ? asintota
        : [asintota];

      let cerca = lista.some(a => Math.abs(x - a) < 0.03);

      if(cerca){

        first = true;
        continue;
      }
    }

    let y;

    try{

      y = f(x);

      if(!isFinite(y)){

        first = true;
        continue;
      }

    }catch{

      first = true;
      continue;
    }

    let px = w/2 + x*escalaX;
    let py = h/2 - y*escalaY;

    if(py > h + 1000 || py < -1000){
      continue;
    }

    if(first){

      ctx.moveTo(px,py);
      first = false;

    }else{

      ctx.lineTo(px,py);
    }
  }

  ctx.strokeStyle = "blue";
  ctx.lineWidth = 2;

  ctx.stroke();

  // PUNTOS EN LAS RAICES

  const raices = {

    f1: [0, 2, 4],
    f2: [0, 1],
    f3: [-0.8],
    f4: [2.5],
    f5: [-1],
    f6: [0],
    f7: [-1, 5],
  };

  if(raices[canvasId]){

    raices[canvasId].forEach(r => {

      let y = f(r);

      if(!isFinite(y)) return;

      let px = w/2 + r*escalaX;
      let py = h/2 - y*escalaY;

      ctx.beginPath();

      ctx.arc(px, py, 3, 0, Math.PI * 2);

      ctx.fillStyle = "blue";

      ctx.fill();
    });
  }

  // PUNTO CORTE CON EJE Y

  try{

    let y0 = f(0);

    if(isFinite(y0)){

      let px0 = w/2;
      let py0 = h/2 - y0*escalaY;

      ctx.beginPath();

      ctx.arc(px0, py0, 3, 0, Math.PI * 2);

      ctx.fillStyle = "blue";

      ctx.fill();
    }

  }catch{}

  // ASINTOTAS PUNTEADAS

  if(asintota !== null){

    let lista = Array.isArray(asintota)
      ? asintota
      : [asintota];

    lista.forEach(a => {

      let px = w/2 + a*escalaX;

      ctx.beginPath();

      ctx.setLineDash([8,8]);

      ctx.strokeStyle = "red";
      ctx.lineWidth = 2;

      ctx.moveTo(px,0);
      ctx.lineTo(px,h);

      ctx.stroke();
    });

    ctx.setLineDash([]);
  }
}

// GRAFICAS

dibujar(
  "f1",
  x => x**3 - 6*x**2 + 8*x
);

dibujar(
  "f2",
  x => (x*(x-1))/(x+1),
  20,
  8,
  -1,
  5
);

dibujar(
  "f3",
  x => Math.log(x + 1.80),
  20,
  20,
  -2
);

dibujar(
  "f4",
  x => 2*x - 5
);

dibujar(
  "f5",
  x => Math.sqrt(x + 1)/(x - 2),
  25,
  25,
  [-1,2]
);

dibujar(
  "f6",
  x => Math.abs(Math.exp(x) - 1)
);

dibujar(
  "f7",
  x => -0.5*(x + 1)*(x - 5),
  20
);

</script>

</body>
</html>
