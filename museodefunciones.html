<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Museo de Funciones</title>

<style>
body { font-family: Arial; text-align: center; }

.screen { display: none; }
.active { display: block; }

.mapa {
  position: relative;
  width: 750px;
  height: 450px;
  margin: auto;
  border: 4px solid black;
  background: #f2f2f2;
}

.pared { position: absolute; background: black; }
.h { height: 4px; }
.v { width: 4px; }

.puerta { position: absolute; background: #f2f2f2; }

.entrada {
  position: absolute;
  bottom: 0;
  left: 320px;
  width: 100px;
  height: 20px;
  background: #f2f2f2;
  border-top: 4px solid black;
  font-weight: bold;
}

.sala {
  position: absolute;
  width: 80px;
  height: 50px;
  background: red;
  color: white;
  font-size: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  border-radius: 6px;
}

#s1 { top: 340px; left: 320px; }
#s2 { top: 220px; left: 320px; }
#s3 { top: 220px; left: 100px; }
#s4 { top: 220px; left: 540px; }
#s5 { top: 80px; left: 100px; }
#s6 { top: 80px; left: 320px; }
#s7 { top: 80px; left: 540px; }

canvas {
  border: 10px solid #5a3e2b;
  background: white;
}

button {
  margin-top: 10px;
  padding: 10px;
}
</style>
</head>

<body>

<h1>🏛️ Museo de Funciones</h1>

<div id="mapa" class="screen active">

<div class="mapa">

  <div class="pared h" style="top:0; left:0; width:750px;"></div>
  <div class="pared h" style="top:446px; left:0; width:750px;"></div>
  <div class="pared v" style="top:0; left:0; height:450px;"></div>
  <div class="pared v" style="top:0; left:746px; height:450px;"></div>

  <div class="pared h" style="top:300px; left:0; width:750px;"></div>
  <div class="pared h" style="top:160px; left:0; width:750px;"></div>

  <div class="pared v" style="top:0; left:250px; height:300px;"></div>
  <div class="pared v" style="top:0; left:500px; height:300px;"></div>

  <div class="puerta" style="top:300px; left:350px; width:70px; height:4px;"></div>
  <div class="puerta" style="top:240px; left:250px; width:4px; height:60px;"></div>
  <div class="puerta" style="top:240px; left:500px; width:4px; height:60px;"></div>

  <div class="puerta" style="top:160px; left:120px; width:40px; height:4px;"></div>
  <div class="puerta" style="top:160px; left:370px; width:40px; height:4px;"></div>
  <div class="puerta" style="top:160px; left:620px; width:40px; height:4px;"></div>

  <div class="entrada">Entrada</div>

  <div id="s1" class="sala" onclick="abrir('c1')">Sala 1</div>
  <div id="s2" class="sala" onclick="abrir('c2')">Sala 2</div>
  <div id="s3" class="sala" onclick="abrir('c3')">Sala 3</div>
  <div id="s4" class="sala" onclick="abrir('c4')">Sala 4</div>
  <div id="s5" class="sala" onclick="abrir('c5')">Sala 5</div>
  <div id="s6" class="sala" onclick="abrir('c6')">Sala 6</div>
  <div id="s7" class="sala" onclick="abrir('c7')">Sala 7</div>

</div>
</div>

<!-- SALAS -->
<div id="c1" class="screen"><h2>Sala 1</h2><canvas id="f1" width="300" height="300"></canvas><button onclick="volver()">Volver</button></div>
<div id="c2" class="screen"><h2>Sala 2</h2><canvas id="f2" width="300" height="300"></canvas><button onclick="volver()">Volver</button></div>
<div id="c3" class="screen"><h2>Sala 3</h2><canvas id="f3" width="300" height="300"></canvas><button onclick="volver()">Volver</button></div>
<div id="c4" class="screen"><h2>Sala 4</h2><canvas id="f4" width="300" height="300"></canvas><button onclick="volver()">Volver</button></div>
<div id="c5" class="screen"><h2>Sala 5</h2><canvas id="f5" width="300" height="300"></canvas><button onclick="volver()">Volver</button></div>
<div id="c6" class="screen"><h2>Sala 6</h2><canvas id="f6" width="300" height="300"></canvas><button onclick="volver()">Volver</button></div>
<div id="c7" class="screen"><h2>Sala 7</h2><canvas id="f7" width="300" height="300"></canvas><button onclick="volver()">Volver</button></div>

<script>

function abrir(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function volver(){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('mapa').classList.add('active');
}

function dibujar(canvasId, f, escala=20){
  const c = document.getElementById(canvasId);
  const ctx = c.getContext("2d");

  const w = c.width;
  const h = c.height;

  ctx.clearRect(0,0,w,h);

  ctx.beginPath();
  ctx.moveTo(0, h/2);
  ctx.lineTo(w, h/2);
  ctx.moveTo(w/2, 0);
  ctx.lineTo(w/2, h);
  ctx.stroke();

  ctx.font = "10px Arial";

  for(let i=-6;i<=6;i++){
    ctx.fillText(i, w/2 + i*escala - 5, h/2 + 12);
    if(i!==0){
      ctx.fillText(i, w/2 + 5, h/2 - i*escala + 3);
    }
  }

  ctx.beginPath();
  let first = true;

  for(let x=-10;x<=10;x+=0.05){
    let y;
    try{
      y = f(x);
      if(!isFinite(y) || Math.abs(y)>50) continue;
    }catch{
      continue;
    }

    let px = w/2 + x*escala;
    let py = h/2 - y*escala;

    if(first){
      ctx.moveTo(px, py);
      first=false;
    }else{
      ctx.lineTo(px, py);
    }
  }

  ctx.stroke();
}

/* =========================
   FUNCIONES
========================= */

dibujar("f1", x => x**3 - 6*x**2 + 8*x);

// 🔥 SALA 2 ACTUALIZADA
dibujar("f2", x => (x*(x-1))/(x+1), 20);

// ASÍNTOTA x = -1
(function(){
  const c = document.getElementById("f2");
  const ctx = c.getContext("2d");

  ctx.setLineDash([6,6]);
  ctx.strokeStyle = "red";

  let x = c.width/2 + (-1)*20;

  ctx.beginPath();
  ctx.moveTo(x, 0);
  ctx.lineTo(x, c.height);
  ctx.stroke();

  ctx.setLineDash([]);
  ctx.strokeStyle = "black";
})();

dibujar("f3", x => Math.log(x + 2), 20);

(function(){
  const c = document.getElementById("f3");
  const ctx = c.getContext("2d");

  ctx.setLineDash([6,6]);
  ctx.strokeStyle = "red";

  let x = c.width/2 + (-2)*20;

  ctx.beginPath();
  ctx.moveTo(x,0);
  ctx.lineTo(x,c.height);
  ctx.stroke();

  ctx.setLineDash([]);
  ctx.strokeStyle = "black";
})();

dibujar("f4", x => 2*x - 5);

dibujar("f5", x => -0.1*(x+3)*(x-2)*(x-6), 20);

dibujar("f6", x => Math.abs(Math.exp(x) - 1));

dibujar("f7", x => -0.5*(x-2)**2 + 4, 20);

</script>

</body>
</html>
