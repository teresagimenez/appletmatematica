<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pantalla de monitoreo del sistema</title>

<style>

body{
font-family:Arial;
background:#0f1720;
color:#00ffcc;
text-align:center;
}

.panel{
background:#081018;
border:2px solid #00ffcc;
padding:15px;
display:inline-block;
}

canvas{
background:#000;
border:1px solid #00ffcc;
cursor:crosshair;
touch-action:none; /* evita que el dedo mueva la página */
}

.info{
margin-top:10px;
font-size:20px;
}

.titulo{
color:#00ffcc;
font-size:22px;
margin-bottom:10px;
}

</style>
</head>

<body>

<div class="panel">

<div class="titulo">
MONITOREO DIGITAL – SISTEMA DE REFRIGERACIÓN
</div>

<canvas id="grafico" width="700" height="420"></canvas>

<div class="info">
Parámetro x = <span id="valorx">-</span> |
Presión f(x) = <span id="valory">-</span>
</div>

</div>

<script>

const canvas = document.getElementById("grafico");
const ctx = canvas.getContext("2d");

const origenX = 350;
const origenY = 210;
const escala = 50;

/* función */

function f(x){

if(Math.abs(x-2)<0.005){
return null;
}

return ((x+2)*(x+1)*(x-1)*(x-3))/(x-2);

}

/* dibujar grilla tipo monitor */

function dibujarGrilla(){

ctx.clearRect(0,0,700,420);

ctx.strokeStyle="#003a3a";
ctx.lineWidth=1;

for(let x=0;x<700;x+=50){

ctx.beginPath();
ctx.moveTo(x,0);
ctx.lineTo(x,420);
ctx.stroke();

}

for(let y=0;y<420;y+=50){

ctx.beginPath();
ctx.moveTo(0,y);
ctx.lineTo(700,y);
ctx.stroke();

}

/* ejes */

ctx.strokeStyle="#00ffcc";

ctx.beginPath();
ctx.moveTo(0,origenY);
ctx.lineTo(700,origenY);
ctx.stroke();

ctx.beginPath();
ctx.moveTo(origenX,0);
ctx.lineTo(origenX,420);
ctx.stroke();

/* numeración eje x */

ctx.fillStyle="#00ffcc";

for(let i=-6;i<=6;i++){

let px=origenX+i*escala;
ctx.fillText(i,px-5,origenY+15);

}

}

/* asíntota */

function dibujarAsintota(){

let ax=origenX+2*escala;

ctx.setLineDash([6,6]);
ctx.strokeStyle="#ffaa00";

ctx.beginPath();
ctx.moveTo(ax,0);
ctx.lineTo(ax,420);
ctx.stroke();

ctx.setLineDash([]);

}

/* raíces */

function dibujarRaices(){

let roots=[-2,-1,1,3];

roots.forEach(r=>{

let px=origenX+r*escala;

ctx.beginPath();
ctx.arc(px,origenY,5,0,Math.PI*2);
ctx.fillStyle="#00ffcc";
ctx.fill();

});

}

/* función */

function dibujarFuncion(){

ctx.beginPath();
ctx.strokeStyle="#00ff00";
ctx.lineWidth=2;

let primera=true;

for(let x=-6;x<=6;x+=0.01){

let y=f(x);

if(y===null || Math.abs(y)>50){
primera=true;
continue;
}

let px=origenX+x*escala;
let py=origenY-y*escala;

if(primera){

ctx.moveTo(px,py);
primera=false;

}else{

ctx.lineTo(px,py);

}

}

ctx.stroke();

}

function dibujar(){

dibujarGrilla();
dibujarFuncion();
dibujarAsintota();
dibujarRaices();

}

dibujar();

/* función para actualizar el punto */

function actualizar(mouseX){

let x = Math.round(((mouseX-origenX)/escala)*10)/10;

let y=f(x);

dibujar();

if(y!==null){

let px=origenX+x*escala;
let py=origenY-y*escala;

ctx.beginPath();
ctx.arc(px,py,7,0,Math.PI*2);
ctx.fillStyle="red";
ctx.fill();

document.getElementById("valorx").innerText=x.toFixed(2);
document.getElementById("valory").innerText=y.toFixed(2);

}
else{

document.getElementById("valorx").innerText=x.toFixed(2);
document.getElementById("valory").innerText="no existe";

}

}

/* mouse (computadora) */

canvas.addEventListener("mousemove",function(event){

let rect=canvas.getBoundingClientRect();
let mouseX=event.clientX-rect.left;

actualizar(mouseX);

});

/* touch (celular) */

canvas.addEventListener("touchmove",function(event){

event.preventDefault();

let rect=canvas.getBoundingClientRect();
let touch=event.touches[0];
let mouseX=touch.clientX-rect.left;

actualizar(mouseX);

},{passive:false});

</script>

</body>
</html>
